  <rect x="75" y="26" width="11" height="24" rx="3" fill="#f4f1eb"/>
  <rect x="69" y="44" width="14" height="10" rx="3" fill="#f4f1eb"/>
  <!-- Orta yatay kol -->
  <rect x="24" y="50" width="56" height="13" rx="3" fill="#f4f1eb"/>
  <!-- Sag bacak (diagonal) -->
  <rect x="60" y="63" width="15" height="47" rx="3"
        transform="rotate(20 67 86)" fill="#f4f1eb"/>

  <!-- Turuncu download rozeti - sag alt -->
