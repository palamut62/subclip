<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Koyu yuvarlatilmis zemin -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#2a2a26"/>

  <!-- "R" harfi - krem beyaz -->
  <!-- Sol dikey govde -->
  <rect x="24" y="18" width="15" height="92" rx="3" fill="#f4f1eb"/>
  <!-- Ust yatay kol -->
  <rect x="24" y="18" width="52" height="14" rx="3" fill="#f4f1eb"/>
  <!-- Sag yay yarim daire (bump) - 3 parcayla yaklasik -->
