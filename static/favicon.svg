<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Koyu yuvarlatilmis zemin -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#2a2a26"/>

  <!-- "D" harfi - krem beyaz, blok stil -->
  <!-- Sol dikey govde -->
  <rect x="24" y="18" width="15" height="92" rx="3" fill="#f4f1eb"/>
  <!-- Ust yatay kol -->
  <rect x="24" y="18" width="48" height="14" rx="3" fill="#f4f1eb"/>
  <!-- Alt yatay kol -->
  <rect x="24" y="96" width="48" height="14" rx="3" fill="#f4f1eb"/>
  <!-- Sag dikey kavis (D yuvarlagi) -->
  <rect x="72" y="22" width="14" height="10" rx="3" fill="#f4f1eb"/>
  <rect x="80" y="30" width="12" height="68" rx="3" fill="#f4f1eb"/>
  <rect x="72" y="96" width="14" height="10" rx="3" fill="#f4f1eb"/>

  <!-- Turuncu mikrofon/dub rozeti - sag alt -->
  <circle cx="98" cy="98" r="24" fill="#e85d2a"/>
  <!-- Mikrofon gövdesi -->
  <rect x="92" y="82" width="12" height="20" rx="6" fill="white"/>
  <!-- Mikrofon ayağı (U) -->
  <path d="M86 98 Q86 112 98 112 Q110 112 110 98" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Dik çubuk -->
  <rect x="96.25" y="110" width="3.5" height="6" fill="white"/>
